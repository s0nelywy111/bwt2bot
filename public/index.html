<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Наша сторінка</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="page-shell">
        <section class="hero">
            <h2>Наша особиста сторінка</h2>
            <h1>Кохаю тебе до безтями, сонечко♥♥♥</h1>
            <button id="open-gallery-btn" class="open-gallery-btn" type="button">Відкрити галерею</button>
        </section>

        <section id="featured-preview" class="featured-preview" aria-label="Превью фотографий">
            <div class="featured-preview__header">
            </div>
            <div id="featured-track" class="media-track media-track--preview">
                <p class="empty-state">Завантажую фото...</p>
            </div>
        </section>

        <section id="gallery-panel" class="gallery-shell" aria-hidden="true">
            <div class="gallery-shell__topbar">
                <div>
                    <div class="eyebrow">Галерея</div>
                    <h3 class="gallery-title">Фото, відео та колекції</h3>
                </div>
                <div class="gallery-tabs" role="tablist" aria-label="Выбор раздела галереи">
                    <button class="gallery-tab is-active" type="button" data-gallery-tab="photos">Фото</button>
                    <button class="gallery-tab" type="button" data-gallery-tab="videos">Відео</button>
                    <button class="gallery-tab" type="button" data-gallery-tab="collections">Колекції</button>

                </div>
            </div>

            <div class="gallery-sections">
                <section class="gallery-section is-active" data-gallery-section="photos">
                    <div class="section-head">
                        <h4>Фото</h4>
                    </div>
                    <div id="photo-track" class="media-track">
                        <p id="loading-text">Завантажую фото...</p>
                    </div>
                </section>

                <section class="gallery-section" data-gallery-section="videos">
                    <div class="section-head">
                        <h4>Відео</h4>
                    </div>
                    <div id="video-track" class="media-track">
                        <p class="empty-state">Тут поки немає відео.</p>
                    </div>
                </section>

                <section class="gallery-section" data-gallery-section="collections">
                    <div class="section-head">
                        <h4>Колекції</h4>
                    </div>
                    <div id="collection-track" class="media-track">
                        <p class="empty-state">Колекцій поки немає.</p>
                    </div>
                </section>
            </div>
        </section>
    </div>

    <div id="photo-modal" class="photo-modal" aria-hidden="true">
        <button id="photo-modal-close" class="photo-modal__close" type="button" aria-label="Закрыть просмотр">×</button>
        <img id="photo-modal-image" class="photo-modal__image" alt="">
        <video id="photo-modal-video" class="photo-modal__video" controls playsinline hidden></video>
        <p id="photo-modal-caption" class="photo-modal__caption"></p>
    </div>

    <script src="script.js"></script>
</body>

</html>
