<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Монитор обновлений</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="page-shell">
        <section class="hero">
            <div class="eyebrow">Теплая подборка</div>
            <h2>Трохи нас</h2>
            <p>Спокойная, светлая и романтичная атмосфера с мягким розовым настроением. Фото будут меняться автоматически, чтобы галерея всегда оставалась живой.</p>
        </section>

        <section class="gallery-shell">
            <div id="gallery">
                <p id="loading-text">Завантажую фото...</p>
            </div>
        </section>
    </div>

    <div id="photo-modal" class="photo-modal" aria-hidden="true">
        <button id="photo-modal-close" class="photo-modal__close" type="button" aria-label="Закрыть просмотр">×</button>
        <img id="photo-modal-image" class="photo-modal__image" alt="">
        <p id="photo-modal-caption" class="photo-modal__caption"></p>
    </div>

    <script src="script.js"></script>
</body>

</html>
